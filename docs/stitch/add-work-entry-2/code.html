<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Work Logger - Calendar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d283a",
                        "background-light": "#f8fafc",
                        "background-dark": "#16181c",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header Navigation -->
<header class="sticky top-0 z-10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 py-4">
<div class="flex items-center justify-between max-w-md mx-auto w-full">
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">chevron_left</span>
</button>
<h1 class="text-lg font-semibold tracking-tight">October 2024</h1>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">chevron_right</span>
</button>
</div>
</header>
<main class="flex-1 w-full max-w-md mx-auto p-4 space-y-6">
<!-- Calendar Section -->
<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
<div class="p-4">
<!-- Weekday Labels -->
<div class="grid grid-cols-7 mb-2">
<div class="text-center text-xs font-medium text-slate-400 uppercase tracking-wider py-2">Sun</div>
<div class="text-center text-xs font-medium text-slate-400 uppercase tracking-wider py-2">Mon</div>
<div class="text-center text-xs font-medium text-slate-400 uppercase tracking-wider py-2">Tue</div>
<div class="text-center text-xs font-medium text-slate-400 uppercase tracking-wider py-2">Wed</div>
<div class="text-center text-xs font-medium text-slate-400 uppercase tracking-wider py-2">Thu</div>
<div class="text-center text-xs font-medium text-slate-400 uppercase tracking-wider py-2">Fri</div>
<div class="text-center text-xs font-medium text-slate-400 uppercase tracking-wider py-2">Sat</div>
</div>
<!-- Calendar Grid -->
<div class="grid grid-cols-7 gap-px bg-slate-100 dark:bg-slate-800 rounded-lg overflow-hidden border border-slate-100 dark:border-slate-800">
<!-- Placeholder Empty Days -->
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20"></div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20"></div>
<!-- Day 1 (Tuesday) -->
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 relative p-1">
<span class="text-sm font-medium">1</span>
</div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 relative p-1">
<span class="text-sm font-medium">2</span>
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 flex gap-0.5">
<span class="size-1 bg-primary rounded-full"></span>
</div>
<span class="absolute top-1 right-1 text-[10px] font-bold bg-primary/10 text-primary px-1 rounded">8h</span>
</div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 relative p-1">
<span class="text-sm font-medium">3</span>
<span class="absolute top-1 right-1 text-[10px] font-bold bg-primary/10 text-primary px-1 rounded">7h</span>
</div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 relative p-1">
<span class="text-sm font-medium">4</span>
<span class="absolute top-1 right-1 text-[10px] font-bold bg-primary/10 text-primary px-1 rounded">8h</span>
</div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 relative p-1 bg-slate-50/50">
<span class="text-sm font-medium text-slate-400">5</span>
</div>
<!-- Row 2 -->
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 relative p-1 bg-slate-50/50">
<span class="text-sm font-medium text-slate-400">6</span>
</div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 relative p-1">
<span class="text-sm font-medium">7</span>
<span class="absolute top-1 right-1 text-[10px] font-bold bg-primary/10 text-primary px-1 rounded">9h</span>
</div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 relative p-1 border-2 border-primary rounded-sm">
<span class="text-sm font-bold text-primary">8</span>
<div class="absolute bottom-2 left-1/2 -translate-x-1/2">
<span class="size-1.5 bg-primary rounded-full block"></span>
</div>
</div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 relative p-1">
<span class="text-sm font-medium">9</span>
</div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 relative p-1">
<span class="text-sm font-medium">10</span>
</div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 relative p-1">
<span class="text-sm font-medium">11</span>
</div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 relative p-1 bg-slate-50/50">
<span class="text-sm font-medium text-slate-400">12</span>
</div>
<!-- Row 3+ simplified for UI demo -->
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 p-1"><span class="text-sm font-medium">13</span></div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 p-1"><span class="text-sm font-medium">14</span></div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 p-1"><span class="text-sm font-medium">15</span></div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 p-1"><span class="text-sm font-medium">16</span></div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 p-1"><span class="text-sm font-medium">17</span></div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 p-1"><span class="text-sm font-medium">18</span></div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 p-1 bg-slate-50/50"><span class="text-sm font-medium text-slate-400">19</span></div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 p-1 bg-slate-50/50"><span class="text-sm font-medium text-slate-400">20</span></div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 p-1"><span class="text-sm font-medium">21</span></div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 p-1"><span class="text-sm font-medium">22</span></div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 p-1"><span class="text-sm font-medium">23</span></div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 p-1"><span class="text-sm font-medium">24</span></div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 p-1"><span class="text-sm font-medium">25</span></div>
<div class="bg-white dark:bg-slate-900 h-16 sm:h-20 p-1 bg-slate-50/50"><span class="text-sm font-medium text-slate-400">26</span></div>
</div>
</div>
</div>
<!-- Quick Stats Cards -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-white dark:bg-slate-900 p-5 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
<p class="text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-wider mb-1">Total Hours</p>
<div class="flex items-baseline gap-1">
<span class="text-2xl font-bold text-slate-900 dark:text-slate-100">168</span>
<span class="text-sm text-slate-500">hrs</span>
</div>
</div>
<div class="bg-white dark:bg-slate-900 p-5 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
<p class="text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-wider mb-1">Days Worked</p>
<div class="flex items-baseline gap-1">
<span class="text-2xl font-bold text-slate-900 dark:text-slate-100">21</span>
<span class="text-sm text-slate-500">days</span>
</div>
</div>
</div>
</main>
<!-- Floating Action Button -->
<div class="fixed bottom-24 right-6 sm:right-[calc(50%-180px)]">
<button class="flex items-center gap-2 bg-primary text-white px-5 py-4 rounded-xl shadow-xl hover:scale-105 transition-transform active:scale-95 group">
<span class="material-symbols-outlined font-bold">add</span>
<span class="font-semibold text-sm pr-1">Add Entry</span>
</button>
</div>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 px-6 pb-6 pt-3">
<div class="max-w-md mx-auto flex justify-between items-center">
<a class="flex flex-col items-center gap-1 group text-primary" href="#">
<span class="material-symbols-outlined active-icon">calendar_month</span>
<span class="text-[10px] font-semibold">Calendar</span>
</a>
<a class="flex flex-col items-center gap-1 group text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300" href="#">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-semibold">History</span>
</a>
<a class="flex flex-col items-center gap-1 group text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300" href="#">
<span class="material-symbols-outlined">bar_chart</span>
<span class="text-[10px] font-semibold">Summary</span>
</a>
<a class="flex flex-col items-center gap-1 group text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-semibold">Profile</span>
</a>
</div>
</nav>
<!-- Empty space for nav padding -->
<div class="h-24"></div>
</body></html>
