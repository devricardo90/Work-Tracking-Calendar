<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Premium WorkLog Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d283a",
                        "background-light": "#f6f7f7",
                        "background-dark": "#16181c",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden items-center justify-center p-6">
<div class="w-full max-w-[400px] flex flex-col items-center">
<div class="mb-10 flex flex-col items-center gap-3">
<div class="bg-primary text-white p-3 rounded-xl shadow-lg">
<span class="material-symbols-outlined text-3xl">terminal</span>
</div>
<h2 class="text-primary dark:text-slate-100 text-2xl font-bold tracking-tight">WorkLog</h2>
</div>
<div class="w-full mb-8 text-center">
<h1 class="text-slate-900 dark:text-slate-50 text-3xl font-bold mb-2">Welcome back</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Enter your details to access your dashboard</p>
</div>
<div class="w-full space-y-4">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium px-1">Email</label>
<input class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="alex@company.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center px-1">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Password</label>
<a class="text-primary dark:text-slate-300 text-xs font-semibold hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative group">
<input class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<button class="w-full py-3.5 bg-primary text-white rounded-xl font-semibold shadow-md hover:bg-primary/90 active:scale-[0.98] transition-all mt-4">
                    Sign In
                </button>
</div>
<div class="w-full flex items-center gap-4 my-8">
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-800"></div>
<span class="text-slate-400 text-xs font-medium uppercase tracking-wider">OR</span>
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-800"></div>
</div>
<button class="w-full flex items-center justify-center gap-3 py-3.5 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-300 rounded-xl font-medium hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<img alt="Google" class="w-5 h-5" data-alt="Google colorful logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDWD7_weC6nBVulyCNWUqgiwSrKbJpNMZkHfFXmjrZRSpEm9OsDMQYJLkSnArAXVP0vMeQdP_pAviK6XDFq1Sxl51st4b0msRXYvn3Gya9W08yQ8rGcxgMicrKZ6HNUd2pZqCbnYji09-krfQo3AsRy7hgucmEWu1KDO-TVNjqcl3I00P8j3jbCmZ1Rdetq1jv9jSrekeo8YrtJLXVsxWRIEkqAaIeRU4F5wEs_j6oIhZlnB2rNjCG6VyxhcvdQat2kiLEaqHQEiQ"/>
                Continue with Google
            </button>
<div class="mt-10 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                    Don't have an account? 
                    <a class="text-primary dark:text-slate-100 font-bold hover:underline ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
<div class="absolute bottom-6 text-slate-300 dark:text-slate-700 text-[10px] uppercase tracking-widest font-bold">
            WorkLog v4.2.0 • Premium Productivity
        </div>
</div>
</body></html>
